<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Shine Cleaning Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fae1e4;
            color: #4b005e;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #f8d3e0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #b892c0;
        }
        section {
            margin: 20px;
            padding: 20px;
            background-color: #ffffff;
            border: 2px solid #d4af37;
            border-radius: 8px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        form input, form select, form textarea {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #d4af37;
            border-radius: 5px;
        }
        button {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #b892c0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Divine Shine Cleaning Services</h1>
    </header>
    <section id="services">
        <h2>Our Services</h2>
        <p>We offer a variety of cleaning services to suit your needs. From residential to commercial cleaning, we've got you covered!</p>
    </section>
    <section id="quote-request">
        <h2>Quote Request Form</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="service-type">Service Type:</label>
            <select id="service-type" name="service-type" required>
                <option value="residential">Residential Cleaning</option>
                <option value="commercial">Commercial Cleaning</option>
            </select>

            <label for="property-details">Property Details:</label>
            <textarea id="property-details" name="property-details" required></textarea>

            <label for="preferred-date">Preferred Date:</label>
            <input type="date" id="preferred-date" name="preferred-date" required>

            <button type="submit">Request Quote</button>
        </form>
    </section>
</body>
</html>
